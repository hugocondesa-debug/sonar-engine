# Pre-commit hooks for SONAR
# Install: pre-commit install
# Run manually: pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  # ---------------------------------------------------------------------------
  # Basic hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]   # allow custom tags (e.g. for mkdocs)
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-docstring-first

  # ---------------------------------------------------------------------------
  # Ruff — lint + format (replaces black, isort, flake8, pylint)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Type checking
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.9
          - pydantic-settings>=2.5
          - types-requests
          - types-pyyaml
          - types-python-dateutil
          - pandas-stubs
          - sqlalchemy>=2.0
          - alembic>=1.13
          - httpx>=0.27
          - tenacity>=9.0
          - structlog>=24.0
          - numpy>=1.26
          - scipy>=1.13
          - statsmodels>=0.14
        args: [--config-file=pyproject.toml]
        exclude: ^(tests/|scripts/|notebooks/|docs/)

  # ---------------------------------------------------------------------------
  # Security — secret scanning
  # ---------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
              package.lock.json|
              .*\.ipynb|
              data/.*|
              backups/.*
          )$

  # ---------------------------------------------------------------------------
  # Gitleaks — additional secret detection
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        exclude: ^\.secrets\.baseline$

  # ---------------------------------------------------------------------------
  # Jupyter notebooks — strip outputs
  # ---------------------------------------------------------------------------
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        files: \.ipynb$

  # ---------------------------------------------------------------------------
  # Markdown — hook REMOVED Day 3 PM (Phase 1 P2-015 repair).
  # Reintroduction deferred per P2-022 (needs project markdown convention first).
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # TOML — format discipline (lint disabled per P2-020; reintroduction deferred)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format

  # ---------------------------------------------------------------------------
  # Shell scripts
  # ---------------------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: \.(sh|bash)$

  # ---------------------------------------------------------------------------
  # Conventional commits (optional — enforces commit message format)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert

ci:
  autofix_commit_msg: "chore(pre-commit): auto-fix from pre-commit hooks"
  autofix_prs: true
  autoupdate_branch: "main"
  autoupdate_commit_msg: "chore(pre-commit): autoupdate hooks"
  autoupdate_schedule: monthly
