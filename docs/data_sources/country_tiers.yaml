# SONAR v2 — Country tier classification
# Phase 0 Bloco D1
# Última revisão: 2026-04-18
#
# CRITÉRIOS DE CLASSIFICAÇÃO (precedence order):
#
# 1. Market liquidity — existência de sovereign bond market com yields
#    diários em ≥6 tenores (sine qua non para overlays L2 NSS + CRP).
#
# 2. Data availability — cobertura em ≥2 das 3 source principais
#    (TE macro indicators, FRED IR*/FXRT*, BIS WS_TC/DSR).
#
# 3. SONAR analytical relevance — relevância editorial 7365 Capital
#    (Portugal-aware, Euro Area focus, G10 baseline, key EMs).
#
# TIERS:
#
#   T1 — Full coverage obligatório. Specs assumem todos os 4 cycles
#        operacionais. Fixtures historical obrigatórios.
#
#   T2 — Full coverage best-effort. Cycles podem ter indices degradados
#        (flags tipo F4_COVERAGE_SPARSE aceitáveis).
#
#   T3 — Partial coverage. ECS + CCCS + MSC + CRP overlay esperados;
#        FCS frequentemente degradado (sem AAII/COT/positioning data).
#
#   T4 — Sparse / CRP-only. Suficiente para rating-spread + CRP
#        via TE + agency scrape. Outros overlays opt-in per spec.
#
# NOTAS:
#   - iso_code usa ISO 3166-1 alpha-2 uppercase (convenção CLAUDE.md §3).
#   - EA (Euro Area aggregate) não é ISO 3166 oficial mas é tratado
#     como T1 para ECB SDW consumer specs.
#   - "default: T4" aplica-se a countries não listados explicitamente.

tiers:

  # =========================================================================
  # T1 — 16 countries · full coverage obligatório
  # =========================================================================
  T1:
    - { iso_code: US, country: United States }
    - { iso_code: DE, country: Germany }
    - { iso_code: FR, country: France }
    - { iso_code: IT, country: Italy }
    - { iso_code: ES, country: Spain }
    - { iso_code: NL, country: Netherlands, rating_spread_live: true }
    - { iso_code: GB, country: United Kingdom, aliases: [UK] }
