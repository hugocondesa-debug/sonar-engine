# Central bank inflation targets (stable config).
#
# Consumed by M2 Taylor gaps per spec §2 precondition. Maintainer:
# stable config, only revise on official CB target announcement.

targets:
  Fed: 0.02      # 2 % PCE core (US)
  ECB: 0.02      # 2 % HICP medium-term (EA)
  BoE: 0.02      # 2 % CPI (GB)
  BoJ: 0.02      # 2 % CPI (JP, post-2013)
  RBA: 0.025     # 2-3 % midpoint (AU)
  BoC: 0.02      # 2 % CPI (CA)
  RBNZ: 0.02     # 2 % midpoint of 1-3 % band (NZ) — RBNZ Remit Policy Targets Agreement
  # SNB mandate is "price stability" defined as CPI inflation of
  # **less than 2 % per year** (band 0-2 %, not a point target). For
  # M2 Taylor-gap consumers the midpoint convention applies — 1 %
  # CPI — matching how the RBA 2-3 % band is represented at 2.5 %
  # above. Downstream M1 CH emits CH_INFLATION_TARGET_BAND on every
  # call to flag that the 1 % figure is a band midpoint, not an
  # SNB-published point target. Source: SNB Monetary Policy Strategy
  # (https://www.snb.ch/en/the-snb/mandates-goals/monetary-policy/
  # strategy).
  SNB: 0.01      # 1 % — 0-2 % band midpoint (CH)
  # Norges Bank operates a point inflation target. The target was
  # reduced from 2.5 % to 2.0 % on 2018-03-02 (Forskrift §2, Finans-
  # departementet). Sprint X-NO uses the current 2.0 % for all M1/M2
  # cadence points — the 2018 regime change is documented here so
  # backtesting work that anchors pre-2018 can swap to 0.025 without
  # touching the YAML. Source: Norges Bank "Monetary policy guidelines"
  # (https://www.norges-bank.no/en/topics/Monetary-policy/mandate-
  # monetary-policy/).
  Norges Bank: 0.02  # 2 % CPI (NO, post-2018; 2.5 % pre-2018-03-02)
  # Riksbank inflation target is 2 % CPIF (Consumer Price Index with
  # a Fixed interest rate). Adopted as an explicit point target in
  # 1993 (with the "1-3 %" band phased in and out of the Riksbank's
  # framing); since 2017 the Riksbank has framed it as a point target
  # of 2 % with a tolerance band of 1-3 % for assessing deviations.
  # The target was switched from CPI to CPIF in 2017-09-07 to remove
  # the direct mechanical impact of the policy rate on the target
  # measure (CPIF holds mortgage-rate-linked housing costs at a fixed
  # interest rate). M2 Taylor-gap consumers treat it as a clean point
  # target — no SE-specific flag needed (contrast CH where the 0-2 %
  # band midpoint emits CH_INFLATION_TARGET_BAND on every call).
  # Source: Riksbank "Inflation target" explainer + MPR introductory
  # pages (https://www.riksbank.se/en-gb/monetary-policy/
  # the-inflation-target/).
  Riksbank: 0.02 # 2 % CPIF (SE, explicit point target since 1993)

# Country keys use ISO 3166-1 alpha-2 canonical codes (GB not UK per
# ADR-0007). Legacy "UK" input still resolves via the loader alias
# in _config.py with a structlog deprecation warning.
#
# Sprint Y-DK introduces the **imported_eur_peg** convention — see
# the DK entry in `target_conventions` below + the resolver hook in
# `sonar.indices.monetary._config.resolve_inflation_target`. Countries
# with a DKK/EUR-style fixed-rate regime do not publish a domestic
# inflation target; the de-facto anchor is imported from the central
# bank that owns the peg currency (ECB for DK).
country_to_target:
  US: Fed
  EA: ECB
  DE: ECB
  PT: ECB
  IT: ECB
  ES: ECB
  FR: ECB
  NL: ECB
  GB: BoE
  JP: BoJ
  AU: RBA
  CA: BoC
  NZ: RBNZ
  CH: SNB
  "NO": Norges Bank   # quoted — YAML 1.1 treats unquoted NO as boolean False
  SE: Riksbank
  # DK has NO domestic inflation target. Nationalbanken's mandate is
  # exchange-rate stability — the DKK is fixed to EUR at 7.46038
  # within the ERM-II ±2.25 % band (de facto narrow band ±2.25 %).
  # The de-facto inflation anchor is imported from the ECB's 2 %
  # HICP medium-term target via the peg. The cascade emits
  # `DK_INFLATION_TARGET_IMPORTED_FROM_EA` on every persisted DK M1
  # row to surface the convention to operators (vs the standard
  # `EXPECTED_INFLATION_CB_TARGET` flag the other countries emit).
  # The target value is the same 2 % the ECB targets — the
  # difference is purely the SOURCE/CONVENTION which is what the
  # `target_conventions` block + flag emission carries.
  DK: ECB

# Per-country target-resolution convention. Countries absent default
# to "domestic" (the central bank in country_to_target publishes the
# point or band-midpoint target the country tracks). Sprint Y-DK
# introduces "imported_eur_peg" for DK to capture the structural
# EUR-peg-coupling story — Nationalbanken does not run an
# independent monetary policy + does not publish a domestic
# inflation target; the de-facto anchor is the ECB's 2 % HICP
# target imported via the DKK/EUR peg. The resolver hook in
# `sonar.indices.monetary._config.resolve_inflation_target_convention`
# returns the convention string so cascade builders can attach the
# right flag (`EXPECTED_INFLATION_CB_TARGET` for domestic /
# `DK_INFLATION_TARGET_IMPORTED_FROM_EA` for imported_eur_peg).
target_conventions:
  DK: imported_eur_peg

# EM countries without stable target → NO_TARGET flag (spec §4 step 2):
# CN, IN, BR, TR, AR, MX, ZA, ID — compute skips M2 for those.
