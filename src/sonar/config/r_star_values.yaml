NZ:
  # Reserve Bank of New Zealand does not publish an HLW-equivalent
  # natural rate, but the RBNZ Bulletin / Discussion Paper series
  # ("Revisiting the neutral OCR in Aotearoa New Zealand", 2023-24
  # refreshes) bracket the nominal neutral OCR in the [3.00, 4.00] %
  # range (point estimate ~3.5 % nominal). Subtracting the 2 %
  # mid-band of the RBNZ 1-3 % target gives a ~1.5 % real neutral
  # rate; SONAR anchors at 1.75 % as the midpoint of the 1.5-2.0 %
  # range implied by the staff work, matching the magnitude the RBNZ
  # uses when it marks cycle peaks at OCR ≈ 5.5 % (i.e. +~2 pp above
  # the 3.5 % nominal anchor). Downstream emits R_STAR_PROXY on every
  # NZ M1/M2 call per spec §4 until an academic HLW-NZ series or an
  # RBNZ publication with a point estimate lands.
  r_star_pct: 0.0175      # 1.75 % — RBNZ Bulletin / Discussion Papers 2023-2024 (SONAR Phase 1 proxy)
  last_updated: "2025-02-18"
  source: "RBNZ Bulletin / Discussion Papers 2023-2024 — neutral-rate range synthesis (SONAR Phase 1 proxy)"
  proxy: true              # consumers emit R_STAR_PROXY per spec §4

CH:
  # Swiss National Bank does not publish an HLW-equivalent natural rate.
  # The Swiss r* is structurally low — the CHF's safe-haven premium
  # compresses the domestic natural rate relative to other G10 economies,
  # and SNB research consistently places it in a [-0.25, 0.75] % real
  # range. Value anchored to SNB Working Paper 2024-09 ("The natural
  # rate of interest in Switzerland: estimates and implications") which
  # reported a posterior median ≈ 0.25 % real after the post-COVID
  # reset; this matches the broader SNB literature (Kaufmann & Lein
  # 2023; SNB Quarterly Bulletin Q3 2024 neutral-rate discussion) that
  # treats 0.25 % as the Phase 1 consensus anchor.
  #
  # Important context: the 2015-2022 negative-rate corridor (policy
  # rate at -0.75 %) put the ex-post real policy rate persistently
  # below r*, which is consistent with SNB's explicit CHF-appreciation
  # containment mandate during that window rather than a signal about
  # the structural r* itself. Downstream emits R_STAR_PROXY on every CH
  # M1/M2 call per spec §4 until an academic HLW-CH series or an SNB
  # publication with a point estimate lands.
  r_star_pct: 0.0025      # 0.25 % — SNB WP 2024-09 posterior median (SONAR Phase 1 proxy)
  last_updated: "2024-09-30"
  source: "SNB Working Paper 2024-09 — Swiss natural-rate posterior median (SONAR Phase 1 proxy)"
  proxy: true              # consumers emit R_STAR_PROXY per spec §4

"NO":   # quoted — YAML 1.1 treats unquoted NO as boolean False
  # Norges Bank does not publish an HLW-equivalent natural rate, but
  # its Monetary Policy Report / Occasional Papers series (latest
  # thematic discussion in MPR 1/2024 and Norges Bank Staff Memo
  # 7/2023 "The real neutral rate of interest in Norway") bracket the
  # real neutral rate at roughly [0.5, 2.0] % — midpoint ~1.25 % real.
  # The nominal neutral is then ~3.25 % after the 2 % Norges Bank
  # inflation target (revised down from 2.5 % in 2018; the target
  # change is not retrofitted into the neutral rate because Norges
  # Bank staff work explicitly decomposes real vs nominal). The 1.25 %
  # real anchor matches the brief's "r* MID" specification and is
  # consistent with how Norges Bank itself frames "roughly 2 % nominal
  # short-rate in the long run" in the 2024 MPR forward guidance.
  #
  # Petroleum-fund context: Norway's oil-wealth sovereign savings
  # (Government Pension Fund Global — NOK ~16 trillion) exert a
  # structural safe-asset-buyer effect on domestic NOK yields that is
  # theoretically neutral at the Norges Bank policy anchor (the fund
  # is legally invested offshore) but can complicate point estimates
  # of r*. The MPR range already incorporates this — the 1.25 % is the
  # neutral-rate mid, not the petroleum-fund-adjusted residual.
  # Downstream emits R_STAR_PROXY on every NO M1/M2 call per spec §4
  # until an academic HLW-NO series or a Norges Bank point-estimate
  # publication lands.
  r_star_pct: 0.0125      # 1.25 % — Norges Bank MPR 1/2024 + Staff Memo 7/2023 mid (SONAR Phase 1 proxy)
  last_updated: "2024-03-30"
  source: "Norges Bank MPR 1/2024 + Staff Memo 7/2023 — neutral-rate range mid (SONAR Phase 1 proxy)"
  proxy: true              # consumers emit R_STAR_PROXY per spec §4

SE:
  # Sveriges Riksbank does not publish an HLW-equivalent natural rate
  # with a point estimate. The Riksbank Monetary Policy Report (MPR)
  # discusses the neutral interest rate qualitatively each quarter;
  # the latest (MPR March 2026) cites staff analysis placing the
  # Swedish neutral nominal policy rate in the [2.00, 3.00] % range,
  # midpoint 2.50 %, which translates to ~0.5 % real after the 2 %
  # CPIF target — with an additional ~0.25 pp haircut for structural
  # downward pressure (ageing demographics + Nordic low-r* clustering
  # that also shows up in the CH / NO natural-rate literature). SONAR
  # anchors at 0.75 % real as the midpoint of the 0.50-1.00 % range
  # implied by the MPR synthesis + Riksbank Studies Papers 2023-2024
  # ("The trend level of the real interest rate in Sweden"). This
  # matches the NZ anchor (1.75 %) minus the ~1 pp Nordic structural
  # compression that separates the Antipodean and European low-r*
  # clusters; and it places SE above CH (0.25 %) because the Swedish
  # economy lacks the CHF-specific safe-haven compression.
  #
  # Important context: the 2015-02-12 → 2019-11-30 negative-rate
  # corridor (Riksbank policy rate as low as -0.50 %) put the ex-post
  # real policy rate persistently below r*, which — like the parallel
  # SNB episode — is consistent with an explicit exchange-rate /
  # disinflation-containment mandate during that window rather than
  # a signal about the structural r* itself. Downstream emits
  # R_STAR_PROXY on every SE M1/M2 call per spec §4 until an academic
  # HLW-SE series or a Riksbank publication with a point estimate lands.
  r_star_pct: 0.0075      # 0.75 % — Riksbank MPR March 2026 neutral-range synthesis (SONAR Phase 1 proxy)
  last_updated: "2026-03-31"
  source: "Riksbank Monetary Policy Report March 2026 + Studies Papers 2023-2024 — Swedish neutral-rate range synthesis (SONAR Phase 1 proxy)"
  proxy: true              # consumers emit R_STAR_PROXY per spec §4

DK:
  # Danmarks Nationalbanken does not publish an HLW-equivalent
  # natural rate. The Danish r* is best understood as **imported from
  # the EA via the DKK/EUR ERM-II peg** — Nationalbanken does not run
  # an independent monetary policy, so the "domestic" neutral nominal
  # rate is structurally tied to the EA neutral rate (EA r* ≈ -0.5 %
  # real per HLW EA Q4 2024) plus a small DK-specific risk premium.
  # Nationalbanken Working Paper 152/2020 ("The natural rate of
  # interest and the equilibrium real exchange rate in Denmark") +
  # the 2024 Monetary Review staff discussion bracket the Danish real
  # neutral rate at roughly [0.25, 1.25] % — midpoint ~0.75 % real.
  # The midpoint cleanly aligns with SE (Riksbank MPR March 2026
  # midpoint also at 0.75 % real) reflecting the broader Nordic
  # low-r* cluster. SONAR anchors at 0.75 % real as the midpoint of
  # the Nationalbanken WP 152/2020 + Monetary Review 2024 range
  # synthesis — matching SE's Nordic cluster magnitude and sitting
  # above CH (0.25 %) because DKK lacks the CHF safe-haven
  # compression. Downstream emits R_STAR_PROXY on every DK M1/M2
  # call per spec §4 until an academic HLW-DK series or a
  # Nationalbanken publication with a point estimate lands.
  #
  # Important context: the 2015-04-07 → 2022-09-15 negative-rate
  # corridor (Nationalbanken CD rate as low as -0.75 %) was driven
  # by EUR-peg defence — appreciation pressure on DKK during the
  # ECB's deep negative-rate era forced Nationalbanken to mirror
  # (and slightly under-cut) the ECB deposit rate to discourage
  # capital inflows. This is a structural EUR-peg-coupling story,
  # not a signal about the Danish structural r*.
  r_star_pct: 0.0075      # 0.75 % — Nationalbanken WP 152/2020 + MR 2024 mid (SONAR Phase 1 proxy)
  last_updated: "2024-12-31"
  source: "Nationalbanken WP 152/2020 + Monetary Review 2024 — Danish neutral-rate range synthesis (SONAR Phase 1 proxy)"
  proxy: true              # consumers emit R_STAR_PROXY per spec §4
