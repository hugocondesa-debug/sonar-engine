# Hardcoded HLW r* values (Phase 1 workaround per user key decision).
#
# Full HLW connector lives in Phase 2+ (CAL surfaced from this sprint —
# see docs/planning/retrospectives/week6-sprint-1b-msc-indices-report.md).
#
# Ritual: quarterly manual refresh. Source: NY Fed HLW quarterly release
# at https://www.newyorkfed.org/research/policy/rstar + Holston-Laubach-
# Williams EA equivalent quarterly publication.
#
# Consumers: M1 effective rates + M2 Taylor gaps (both read r_star_pct
# through src/sonar/config/loaders.py:load_r_star_values).
#
# Staleness: spec §2 CCCS precondition caps confidence with
# CALIBRATION_STALE flag when last_updated > 95 days.

US:
  r_star_pct: 0.008       # 0.8 % — NY Fed HLW Q4 2024
  last_updated: "2025-01-15"
  source: "NY Fed HLW Q4 2024"

EA:
  r_star_pct: -0.005      # -0.5 % — Holston-Laubach-Williams EA Q4 2024
  last_updated: "2025-01-15"
  source: "HLW EA equivalent Q4 2024"

# PT / IT / ES / FR / NL: use EA proxy — consumers emit R_STAR_PROXY flag
# per spec. No separate entry required; loader falls back to EA.

# GB (United Kingdom) — ISO 3166-1 alpha-2 canonical. Legacy "UK"
# lookups continue to resolve via the loader alias in _config.py
# (ADR-0007; deprecation warning emitted).
GB:
  # BoE MPC does not publish an r* equivalent. Value anchored to the
  # Bank's "low-for-long" 2023 MPR neutral-rate discussion (~0.5 pp
  # in real terms) and DMP Q4 2024 "expected Bank Rate in the long
  # run" of ~3.5 % nominal minus CPI target 2 % = 1.5 % real upper
  # bound. Empirical centre stays at 0.5 % pending an academic HLW-GB
  # series. Downstream emits R_STAR_PROXY on every GB M1/M2 call.
  r_star_pct: 0.005       # 0.5 % — BoE MPR 2023 + DMP Q4 2024 synthesis
  last_updated: "2025-01-15"
  source: "BoE MPR 2023 + DMP Q4 2024 (SONAR Phase 1 proxy)"
  proxy: true              # consumers emit R_STAR_PROXY per spec §4

JP:
  # BoJ does not publish an HLW-equivalent neutral rate. Value anchored
  # to BoJ Research & Studies staff work during the QQE / YCC era (2013+)
  # which consistently estimated the natural rate around 0 % in real
  # terms. The 2024-2025 normalisation preserves that centre — short-rate
  # liftoff from -0.10 % (Jan 2024) through 0.50 % (Dec 2024) to 0.75 %
  # (Jan 2026) is a policy move, not an r* move. Downstream emits
  # R_STAR_PROXY on every JP M1/M2 call per spec §4 until BoJ (or an
  # academic HLW-JP series) publishes a canonical figure.
  r_star_pct: 0.000       # 0.0 % — BoJ Research & Studies synthesis (QQE legacy)
  last_updated: "2025-01-15"
  source: "BoJ Research & Studies (QQE/YCC era staff work; SONAR Phase 1 proxy)"
  proxy: true              # consumers emit R_STAR_PROXY per spec §4

# CA / AU: pending Phase 2+ manual entry (no HLW at present).
